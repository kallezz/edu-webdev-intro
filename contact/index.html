<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | Amazing Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preload" href="../style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="../style.css"></noscript>
</head>
<body>
<div id="container" class="container">
  <header id="main-nav-wrapper">
    <div id="logo"><span>The Amazing Store</span></div>
    <button id="menu-toggle">☰</button>
    <nav id="main-nav">
      <ul>
        <li><a href="/~kalleme/">Home</a></li>
        <li><a href="/~kalleme/products">Products</a></li>
        <li class="active"><a href="/~kalleme/contact">Contact</a></li>
      </ul>
    </nav>
  </header>
  <main id="main-content">
    <div>
      <h1 class="text-center">Contact Us</h1>
      <div class="contact-grid">
        <div class="contact-info">
          <h2>Contact Information</h2>
          <p><strong>Address:</strong> Karaportti 2, 02610 Espoo</p>
          <p><strong>Phone:</strong> 09 74245000</p>
          <p><strong>Email:</strong> <a href="mailto:contact@amazingstore.fi">contact@amazingstore.fi</a></p>
          <p><strong>Hours:</strong> Mon-Fri 9:00-18:00</p>
        </div>
        <div class="contact-map">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1981.385635801887!2d24.755938977171514!3d60.223995875059906!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x468df797cfe43cbb%3A0xb99a2c26d4df39ff!2sMetropolia%20University%20of%20Applied%20Sciences%20-%20Karamalmi%20Campus!5e0!3m2!1sen!2sfi!4v1774372731267!5m2!1sen!2sfi" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>
    </div>
  </main>
</div>
<footer>
  <p>&copy; 2026 Kalle Melender</p>
</footer>
<script>
const menuToggle = document.getElementById('menu-toggle');
const mainNav = document.getElementById('main-nav');

menuToggle?.addEventListener('click', () => {
    mainNav.classList.toggle('active');
});

mainNav?.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
        mainNav.classList.remove('active');
    });
});
</script>
</body>
</html>
